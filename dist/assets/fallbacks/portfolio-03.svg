  <path d="M120 520 C520 640 780 550 1150 730 C1370 840 1490 1000 1580 1130" fill="none" stroke="#39d6c2" stroke-opacity="0.26" stroke-width="5"/>
  <rect width="1600" height="2000" filter="url(#grain)" opacity="0.36"/>
  <text x="120" y="1800" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="70" font-weight="800" letter-spacing="8">IKULUNGWANE</text>
